name: Build Debug APK

on:
  workflow_run:
    workflows: ["Extract Repo Source to TXT"]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Create google-services.json placeholder
        run: |
          if [ ! -f app/google-services.json ]; then
            cat > app/google-services.json << 'EOF'
          {"project_info":{"project_number":"000000000000","project_id":"nexus-placeholder","storage_bucket":"nexus-placeholder.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"com.nexus.android"}},"oauth_client":[],"api_key":[{"current_key":"placeholder"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}
          EOF
          fi

      - name: Build Debug APK
        id: gradle_build
        continue-on-error: true
        run: |
          mkdir -p build_error_logs
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build_error_logs/build_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload APK
        if: steps.gradle_build.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: nexus-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Extract errors
        if: steps.gradle_build.outputs.exit_code != '0'
        run: |
          mkdir -p build_error_logs
          {
            echo "=== Kotlin/Java Errors ==="
            grep -E "\.kt:[0-9]+:[0-9]+ error|\.java:[0-9]+: error|^e: " build_error_logs/build_output.txt || echo "(none)"
            echo "=== XML Resource Errors ==="
            grep -E "\.xml:[0-9]+:" build_error_logs/build_output.txt || echo "(none)"
            echo "=== Build Task Failures ==="
            grep -E "BUILD FAILED|FAILURE: Build failed|Task.*FAILED" build_error_logs/build_output.txt || echo "(none)"
            echo "=== Exception Stack Traces ==="
            grep -A10 "Exception" build_error_logs/build_output.txt | head -100 || echo "(none)"
          } > build_error_logs/error_summary.txt
          tail -1000 build_error_logs/build_output.txt > build_error_logs/build_tail.txt

      - name: Extract error source files
        if: steps.gradle_build.outputs.exit_code != '0'
        run: |
          python3 << 'PYEOF'
          import re, os
          repo_root = os.getcwd(); errors = {}
          patterns = [r"e: file://(.+\.kt):(\d+):(\d+)", r"(.+\.java):(\d+): error:", r"(.+\.xml):(\d+):\d+:", r"(.+\.(?:cpp|c|h|hpp)):(\d+):\d+: error:"]
          with open("build_error_logs/build_output.txt", errors="replace") as f:
              for line in f:
                  for pat in patterns:
                      m = re.search(pat, line)
                      if m:
                          raw = m.group(1).lstrip("/"); lineno = int(m.group(2))
                          for part in raw.split("/"):
                              candidate = raw[raw.find(part):]
                              if os.path.exists(os.path.join(repo_root, candidate)): raw = candidate; break
                          errors.setdefault(raw, []).append((lineno, line.strip()))
          with open("build_error_logs/error_files.txt","w") as out, open("build_error_logs/error_file_list.txt","w") as lst:
              for rel_path, errs in errors.items():
                  lst.write(rel_path + "\n")
                  out.write(f"//===== FILE: {rel_path} =====\n")
                  full = os.path.join(repo_root, rel_path)
                  if not os.path.exists(full): out.write("//===== FILE: (NOT FOUND) =====\n\n"); continue
                  error_lines = {e[0] for e in errs}
                  out.write(f"// ❌ ERRORS ({len(errs)} error(s)):\n")
                  for lineno, msg in errs: out.write(f"// Line {lineno}: {msg}\n")
                  out.write("//\n")
                  with open(full, errors="replace") as src:
                      for i, line in enumerate(src, 1): out.write(f"{i:6}{' ❌' if i in error_lines else ''}\t{line}")
                  out.write("\n\n")
          print(f"Extracted {len(errors)} error files.")
          PYEOF

      - name: Commit error report
        if: steps.gradle_build.outputs.exit_code != '0'
        run: |
          git config user.name "build-error-bot"
          git config user.email "bot@users.noreply.github.com"
          git add build_error_logs/
          git commit -m "Build failed - error report (exit code: ${{ steps.gradle_build.outputs.exit_code }})"
          for i in 1 2 3; do
            git push && break
            git reset --soft HEAD^; git stash
            git pull --rebase origin main || (git rebase --abort && git pull)
            git stash pop; git add build_error_logs/
            git commit -m "Build failed - error report (exit code: ${{ steps.gradle_build.outputs.exit_code }})"
            sleep 2
          done

      - name: Upload error logs artifact
        if: steps.gradle_build.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: build-error-logs
          path: build_error_logs/
          retention-days: 30

      - name: Fail job if build failed
        if: steps.gradle_build.outputs.exit_code != '0'
        run: exit 1
